# docker-compose.local.yml
# 从本地源码构建部署（适用于自定义修改后自行构建）
# 启动：docker-compose -f docker-compose.local.yml up -d --build
# 更新：cd /opt/sub2apipay && git pull && docker-compose -f docker-compose.local.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${APP_PORT:-3001}:3000'
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://sub2apipay:${DB_PASSWORD:-password}@db:5432/sub2apipay
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./uploads:/app/public/uploads:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sub2apipay
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: sub2apipay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sub2apipay']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
